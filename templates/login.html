<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .page {
            display: block !important;
        }
    </style> <!-- Важно для отображения -->
</head>
<body>
    <div class="app-container">
        <div class="center-content">
            <h1 class="text-center mb-24">Цифровой океан знаний</h1>

            {% if msg %}
            <div class="status status--error" style="text-align: center; margin-bottom: 15px;">{{ msg }}</div>
            {% endif %}

            <div class="card">
                <div class="card__body">
                    <!-- Переключатель -->
                    <div class="toggle-switch">
                        <button class="btn btn--secondary active" onclick="toggleUserType('student')">Я ученик</button>
                        <button class="btn btn--secondary" onclick="toggleUserType('teacher')">Я учитель</button>
                    </div>

                    <!-- ФОРМА УЧЕНИКА -->
                    <div id="studentLoginForm">
                        <form action="/" method="post">
                            <input type="hidden" name="role" value="student">
                            <input type="hidden" name="gender" id="genderInput" value="boy">

                            <div class="form-group">
                                <label class="form-label">Выберите пол</label>
                                <div class="toggle-switch">
                                    <button type="button" class="btn btn--secondary active" onclick="selectGender('boy')">Мальчик</button>
                                    <button type="button" class="btn btn--secondary" onclick="selectGender('girl')">Девочка</button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Ваше имя</label>
                                <input type="text" name="username" class="form-control" placeholder="Введите имя" required>
                            </div>
                            <button type="submit" class="btn btn--primary btn--full-width">Войти</button>
                        </form>
                    </div>

                    <!-- ФОРМА УЧИТЕЛЯ -->
                    <div id="teacherLoginForm" class="hidden">
                        <form action="/" method="post">
                            <input type="hidden" name="role" value="teacher">
                            <div class="form-group">
                                <label class="form-label">Логин</label>
                                <input type="text" name="username" class="form-control" placeholder="Логин" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Пароль</label>
                                <input type="password" name="password" class="form-control" placeholder="Пароль" required>
                            </div>
                            <button type="submit" class="btn btn--primary btn--full-width">Войти</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
