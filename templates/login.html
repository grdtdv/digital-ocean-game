<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход - Цифровой океан знаний</title>
    <!-- Добавили ?v=9 для сброса кэша CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=12">
    <style>.page { display: block !important; }</style>
</head>
<body>
    <!-- Обертка с фоном пляжа -->
    <div class="login-stage">
        
        <!-- Стеклянная карточка -->
        <div class="login-glass-card">
            
            <h1 class="login-title">Цифровой океан знаний</h1>
            
            {% if msg %}
            <div class="status status--error" style="text-align: center; margin-bottom: 20px; border-radius: 12px; padding: 10px;">
                {{ msg }}
            </div>
            {% endif %}

            <!-- Переключатель Ученик / Учитель -->
            <div class="toggle-switch" style="margin-bottom: 25px;">
                <button class="btn btn--secondary active" onclick="toggleUserType('student')">Я ученик</button>
                <button class="btn btn--secondary" onclick="toggleUserType('teacher')">Я учитель</button>
            </div>
            
            <!-- ФОРМА УЧЕНИКА -->
            <div id="studentLoginForm">
                <form action="/" method="post">
                    <input type="hidden" name="role" value="student">
                    <input type="hidden" name="gender" id="genderInput" value="boy">

                    <div class="form-group">
                        <label class="form-label" style="color: #526c71; font-weight: bold;">Кто ты?</label>
                        <div class="toggle-switch">
                            <button type="button" class="btn btn--secondary active" onclick="selectGender('boy')">👦 Мальчик</button>
                            <button type="button" class="btn btn--secondary" onclick="selectGender('girl')">👧 Девочка</button>
                        </div>
                    </div>
                    <div class="form-group" style="margin-bottom: 25px;">
                        <label class="form-label" style="color: #526c71; font-weight: bold;">Твое имя</label>
                        <input type="text" name="username" class="form-control" placeholder="Например: Иван" required>
                    </div>
                    <button type="submit" class="btn btn--primary btn--full-width" style="background-color: #2c8c7c; border: none; box-shadow: 0 4px 10px rgba(44,140,124,0.4);">
                        Нырнуть в океан! 🌊
                    </button>
                </form>
            </div>
            
            <!-- ФОРМА УЧИТЕЛЯ -->
            <div id="teacherLoginForm" class="hidden">
                <form action="/" method="post">
                    <input type="hidden" name="role" value="teacher">
                    <div class="form-group">
                        <label class="form-label" style="color: #526c71; font-weight: bold;">Логин</label>
                        <input type="text" name="username" class="form-control" placeholder="Логин учителя" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 25px;">
                        <label class="form-label" style="color: #526c71; font-weight: bold;">Пароль</label>
                        <input type="password" name="password" class="form-control" placeholder="Пароль" required>
                    </div>
                    <button type="submit" class="btn btn--primary btn--full-width" style="background-color: #1a6875; border: none; box-shadow: 0 4px 10px rgba(26,104,117,0.4);">
                        Войти в панель ⚓
                    </button>
                </form>
            </div>

        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/main.js') }}?v=10"></script>
</body>
</html>
